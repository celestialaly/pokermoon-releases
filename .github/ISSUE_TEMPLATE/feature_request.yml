name: Feature Request
description: Suggest a new feature or improvement.
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Before opening an issue, check the [existing issues](https://github.com/celestialaly/pokermoon-releases/issues) to avoid duplicates.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What would you like to see in Poker Moon? Describe the use case, not the implementation.
      placeholder: "Example: I'd like to filter tournaments by buy-in range to compare expensive vs cheap tournaments separately."
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - New poker site / hand history format
        - New statistic or chart
        - UI / UX improvement
        - Import / sync
        - Performance
        - Other
    validations:
      required: true

  - type: textarea
    id: poker_site
    attributes:
      label: Hand history files (poker site support requests only)
      description: |
        If you are requesting support for a new poker site (e.g. PokerStars, GGPoker, PMU…),
        attach **anonymized sample files** so the parser can be built and tested:

        - Tournament summary file (`.txt` or equivalent)
        - Hand history file (`.txt` or equivalent)

        **Before attaching:** replace all player names (including yours) with generic names like `Player1`, `Player2`, etc.
        Rename the file extension to `.log` if GitHub blocks the upload.
      placeholder: Drag and drop your anonymized sample files here.
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Mockups, links, or any other information that helps clarify the request.
    validations:
      required: false
